<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="bgGlow" cx="15%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0A1A1A"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="20" fill="url(#bgGlow)"/>
  <rect x="2" y="2" width="796" height="196" rx="18" fill="none" stroke="#00FFFF" stroke-width="0.8" opacity="0.2"/>

  <!-- Icon (mini version) -->
  <g transform="translate(90, 100) scale(0.35)">
    <!-- Shield -->
    <path d="M0,-120 L120,-70 L120,60 Q120,150 0,180 Q-120,150 -120,60 L-120,-70 Z"
          fill="url(#shieldGrad)" stroke="#00FFFF" stroke-width="3" opacity="0.6" filter="url(#glowCyan)"/>
    <!-- NFC waves -->
    <path d="M-30,-50 A60,60 0 0,1 -30,50" fill="none" stroke="#00FFFF" stroke-width="5" stroke-linecap="round" opacity="1"/>
    <path d="M-50,-80 A100,100 0 0,1 -50,80" fill="none" stroke="#00FFFF" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <path d="M-70,-110 A140,140 0 0,1 -70,110" fill="none" stroke="#00FFFF" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>
    <!-- Phone -->
    <rect x="-15" y="-45" width="55" height="90" rx="6" fill="#0D0D0D" stroke="#00FF41" stroke-width="2.5" filter="url(#glowGreen)"/>
    <rect x="-10" y="-37" width="45" height="65" rx="3" fill="#000000" stroke="#00FF41" stroke-width="0.5" opacity="0.8"/>
    <text x="12" y="-5" font-family="monospace" font-size="16" font-weight="bold" fill="#00FF41" text-anchor="middle">NFC</text>
    <circle cx="12" cy="12" r="3" fill="#00FF41" opacity="0.9"/>
  </g>

  <!-- Text: NFC -->
  <text x="195" y="115" font-family="'Exo 2', 'Exo', sans-serif" font-size="72" font-weight="700" fill="#00FFFF" filter="url(#glowCyan)">NFC</text>

  <!-- Text: EMULATOR -->
  <text x="378" y="115" font-family="'Exo 2', 'Exo', sans-serif" font-size="72" font-weight="700" fill="#E0E0E0">EMULATOR</text>

  <!-- Tagline -->
  <text x="195" y="150" font-family="'JetBrains Mono', monospace" font-size="16" fill="#00FF41" opacity="0.7" filter="url(#glowGreen)">Read. Clone. Emulate.</text>

  <!-- Decorative hex -->
  <text x="620" y="150" font-family="monospace" font-size="11" fill="#00FFFF" opacity="0.15">FF:FF:FF:FF:FF:FF</text>

  <!-- Corner accents -->
  <g stroke="#00FFFF" stroke-width="1" opacity="0.3">
    <line x1="12" y1="14" x2="12" y2="30"/>
    <line x1="12" y1="14" x2="28" y2="14"/>
    <line x1="788" y1="14" x2="788" y2="30"/>
    <line x1="788" y1="14" x2="772" y2="14"/>
    <line x1="12" y1="186" x2="12" y2="170"/>
    <line x1="12" y1="186" x2="28" y2="186"/>
    <line x1="788" y1="186" x2="788" y2="170"/>
    <line x1="788" y1="186" x2="772" y2="186"/>
  </g>
</svg>
