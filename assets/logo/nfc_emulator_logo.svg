<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowMint" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="bgGlow" cx="15%" cy="50%" r="85%">
      <stop offset="0%" stop-color="#0C0C18"/>
      <stop offset="100%" stop-color="#04040C"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#D500F9" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00FF87" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="shieldStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#D500F9"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#D500F9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="24" fill="url(#bgGlow)"/>
  <rect x="2" y="2" width="796" height="196" rx="22" fill="none" stroke="url(#shieldStroke)" stroke-width="0.8" opacity="0.25"/>

  <!-- Mini icon -->
  <g transform="translate(90, 100) scale(0.35)">
    <!-- Shield -->
    <path d="M0,-120 L120,-70 L120,60 Q120,150 0,180 Q-120,150 -120,60 L-120,-70 Z"
          fill="url(#shieldGrad)" stroke="url(#shieldStroke)" stroke-width="3" opacity="0.65" filter="url(#glowCyan)"/>
    <!-- NFC waves -->
    <path d="M-28,-48 A58,58 0 0,1 -28,48" fill="none" stroke="#00E5FF" stroke-width="5" stroke-linecap="round" opacity="1" filter="url(#glowCyan)"/>
    <path d="M-48,-78 A98,98 0 0,1 -48,78" fill="none" stroke="#00E5FF" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <path d="M-68,-108 A138,138 0 0,1 -68,108" fill="none" stroke="#D500F9" stroke-width="3.5" stroke-linecap="round" opacity="0.45" filter="url(#glowPurple)"/>
    <!-- Phone -->
    <rect x="-13" y="-43" width="52" height="86" rx="8" fill="#0C0C18" stroke="#00FF87" stroke-width="2.5" filter="url(#glowMint)"/>
    <rect x="-8" y="-35" width="42" height="62" rx="4" fill="#04040C" stroke="#00FF87" stroke-width="0.5" opacity="0.7"/>
    <text x="13" y="-5" font-family="monospace" font-size="15" font-weight="bold" fill="#00E5FF" text-anchor="middle">NFC</text>
    <circle cx="13" cy="10" r="3.5" fill="#00FF87" opacity="0.9"/>
  </g>

  <!-- Text: NFC — Electric Cyan glow -->
  <text x="195" y="112" font-family="'Exo 2', 'Exo', sans-serif" font-size="72" font-weight="700" fill="#00E5FF" filter="url(#glowCyan)">NFC</text>

  <!-- Text: EMULATOR — Light text with subtle purple tint -->
  <text x="378" y="112" font-family="'Exo 2', 'Exo', sans-serif" font-size="72" font-weight="700" fill="#EAEAF6">EMULATOR</text>

  <!-- Tagline — Neon Mint -->
  <text x="195" y="148" font-family="'JetBrains Mono', monospace" font-size="16" fill="#00FF87" opacity="0.8" filter="url(#glowMint)">Read. Clone. Emulate.</text>

  <!-- Decorative hex — Purple tint -->
  <text x="610" y="148" font-family="monospace" font-size="11" fill="#D500F9" opacity="0.12">FF:FF:FF:FF:FF:FF</text>

  <!-- Corner accents — tricolor -->
  <g stroke-width="1" opacity="0.35">
    <line x1="12" y1="14" x2="12" y2="30" stroke="#00E5FF"/>
    <line x1="12" y1="14" x2="28" y2="14" stroke="#00E5FF"/>
    <line x1="788" y1="14" x2="788" y2="30" stroke="#D500F9"/>
    <line x1="788" y1="14" x2="772" y2="14" stroke="#D500F9"/>
    <line x1="12" y1="186" x2="12" y2="170" stroke="#00FF87"/>
    <line x1="12" y1="186" x2="28" y2="186" stroke="#00FF87"/>
    <line x1="788" y1="186" x2="788" y2="170" stroke="#00E5FF"/>
    <line x1="788" y1="186" x2="772" y2="186" stroke="#00E5FF"/>
  </g>
</svg>
